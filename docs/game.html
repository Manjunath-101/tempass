<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocket Shooter (Web)</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #score { position: absolute; top: 10px; left: 10px; font-size: 24px; }
        canvas { display: block; margin: 0 auto; background: #000; }
        #gameOverModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #gameOverModal.show {
            display: flex;
        }
        .modal-content {
            background: #333;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .modal-content h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
            color: #ff0000;
        }
        .modal-content p {
            font-size: 24px;
            margin: 10px 0 30px 0;
        }
        #retryBtn {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        #retryBtn:hover {
            background-color: #00cc00;
        }
    </style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="game" width="600" height="800"></canvas>
<div id="gameOverModal">
    <div class="modal-content">
        <h1>Game Over!</h1>
        <p id="finalScore">Final Score: 0</p>
        <button id="retryBtn">Retry</button>
    </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// try to load images used by the Python version
const rocketImg = new Image();
rocketImg.src = 'tony.png';
const alienImg = new Image();
alienImg.src = 'doom.png';

const SCREEN_WIDTH = canvas.width;
const SCREEN_HEIGHT = canvas.height;
const LANE_COUNT = 3;
const LANE_WIDTH = SCREEN_WIDTH / LANE_COUNT;

let score = 0;

class Rocket {
    constructor() {
        this.width = 80;
        this.height = 100;
        this.lane = Math.floor(LANE_COUNT / 2);
        this.x = 0;
        this.y = SCREEN_HEIGHT - this.height - 10;
        this.updatePosition();
    }
    updatePosition() {
        this.x = LANE_WIDTH / 2 + this.lane * LANE_WIDTH - this.width / 2;
    }
    moveLeft() {
        if (this.lane > 0) {
            this.lane--;
            this.updatePosition();
        }
    }
    moveRight() {
        if (this.lane < LANE_COUNT - 1) {
            this.lane++;
            this.updatePosition();
        }
    }
    draw() {
        if (rocketImg.complete && rocketImg.naturalWidth) {
            ctx.drawImage(rocketImg, this.x, this.y, this.width, this.height);
        } else {
            ctx.fillStyle = '#fff';
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }
}

class Alien {
    constructor(lane) {
        // match Python rocket_game dimensions and behaviour
        this.width = 80;
        this.height = 80;
        this.lane = lane;
        this.x = LANE_WIDTH / 2 + lane * LANE_WIDTH - this.width / 2;
        this.y = -this.height;
        // speed between 2 and 3 (python used random.randint(2,3))
        this.speed = 2 + Math.random();
    }
    update() {
        this.y += this.speed;
    }
    draw() {
        if (alienImg.complete && alienImg.naturalWidth) {
            ctx.drawImage(alienImg, this.x, this.y, this.width, this.height);
        } else {
            ctx.fillStyle = '#f00';
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }
}

class Coin {
    constructor(lane) {
        this.radius = 15;
        this.lane = lane;
        this.x = LANE_WIDTH / 2 + lane * LANE_WIDTH;
        this.y = -this.radius * 2;
        this.speed = 3 + Math.random() * 2;
    }
    update() {
        this.y += this.speed;
    }
    draw() {
        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Laser {
    constructor(x, y) {
        this.width = 5;
        this.height = 15;
        this.x = x - this.width / 2;
        this.y = y;
        this.speed = 10;
    }
    update() {
        this.y -= this.speed;
    }
    draw() {
        ctx.fillStyle = '#0f0';
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
}

const rocket = new Rocket();
let aliens = [];
let coins = [];
let lasers = [];

function addAlien() {
    aliens.push(new Alien(Math.floor(Math.random() * LANE_COUNT)));
}
function addCoin() {
    coins.push(new Coin(Math.floor(Math.random() * LANE_COUNT)));
}

let lastAlien = 0;
let lastCoin = 0;

function update(delta) {
    // spawn timing matches Python (1800ms aliens, 1000ms coins)
    lastAlien += delta;
    lastCoin += delta;
    if (lastAlien > 1800) { addAlien(); lastAlien = 0; }
    if (lastCoin > 1000) { addCoin(); lastCoin = 0; }
    
    aliens.forEach((a, i) => {
        a.update();
        if (a.y > SCREEN_HEIGHT) aliens.splice(i, 1);
    });
    coins.forEach((c, i) => {
        c.update();
        if (c.y - c.radius > SCREEN_HEIGHT) coins.splice(i, 1);
    });
    lasers.forEach((l, i) => {
        l.update();
        if (l.y + l.height < 0) lasers.splice(i, 1);
    });

    // collisions
    // coins collision: check bounding boxes (circle vs rocket rect)
    coins.forEach((c, i) => {
        const coinRect = {x: c.x - c.radius, y: c.y - c.radius, width: c.radius*2, height: c.radius*2};
        const rocketRect = {x: rocket.x, y: rocket.y, width: rocket.width, height: rocket.height};
        if (coinRect.x < rocketRect.x + rocketRect.width &&
            coinRect.x + coinRect.width > rocketRect.x &&
            coinRect.y < rocketRect.y + rocketRect.height &&
            coinRect.y + coinRect.height > rocketRect.y) {
            score += 1;
            coins.splice(i, 1);
        }
    });

    // laser vs alien using rect-rect collision (same as python)
    lasers.forEach((l, li) => {
        aliens.forEach((a, ai) => {
            if (l.x < a.x + a.width && l.x + l.width > a.x &&
                l.y < a.y + a.height && l.y + l.height > a.y) {
                score += 5;
                aliens.splice(ai, 1);
                lasers.splice(li, 1);
            }
        });
    });

    // rocket hit by any alien (rect collision)
    aliens.forEach(a => {
        if (a.x < rocket.x + rocket.width &&
            a.x + a.width > rocket.x &&
            a.y < rocket.y + rocket.height &&
            a.y + a.height > rocket.y) {
            gameOver();
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
    rocket.draw();
    aliens.forEach(a => a.draw());
    coins.forEach(c => c.draw());
    lasers.forEach(l => l.draw());
    document.getElementById('score').innerText = 'Score: ' + score;
}

let lastTime = 0;
let running = true;
function loop(time) {
    if (!running) return;
    let delta = time - lastTime;
    lastTime = time;
    update(delta);
    draw();
    requestAnimationFrame(loop);
}

function gameOver() {
    running = false;
    document.getElementById('finalScore').innerText = 'Final Score: ' + score;
    document.getElementById('gameOverModal').classList.add('show');
}

function restartGame() {
    // Reset game state
    score = 0;
    aliens = [];
    coins = [];
    lasers = [];
    lastAlien = 0;
    lastCoin = 0;
    lastTime = 0;
    running = true;
    
    // Hide modal
    document.getElementById('gameOverModal').classList.remove('show');
    
    // Restart game loop
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') rocket.moveLeft();
    if (e.key === 'ArrowRight') rocket.moveRight();
    if (e.key === ' ') lasers.push(new Laser(rocket.x + rocket.width/2, rocket.y));
});

// touch controls for mobile: left-half touch moves left, right-half touch moves right
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    const x = touch.clientX - rect.left;
    if (x < rect.width / 2) {
        rocket.moveLeft();
    } else {
        rocket.moveRight();
    }
});

// retry button handler
document.getElementById('retryBtn').addEventListener('click', restartGame);

requestAnimationFrame(loop);
</script>
</body>
</html>
